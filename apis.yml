apis:
  - aid: data-opendevelopmentmyanmar-net:catalog
    name: Open Development Myanmar CKAN Action API
    description: >-
      CKAN Action API for Open Development Myanmar, a consistent JSON-over-HTTP interface over a catalog of 13,484 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://data.opendevelopmentmyanmar.net/api/3/action/.
    humanURL: https://data.opendevelopmentmyanmar.net
    baseURL: https://data.opendevelopmentmyanmar.net/api/3/action
