aid: data-opendevelopmentmyanmar-net
name: Open Development Myanmar
description: >-
  Open Development Myanmar is a organization open-data portal for Myanmar running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 13,484 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
